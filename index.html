<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klaim Hadiah</title>
    <style>
        /* ----- Reset & Global ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a3a5c 100%);
            padding: 20px;
        }

        /* ----- Kartu Utama ----- */
        .card {
            background: #ffffff;
            max-width: 440px;
            width: 100%;
            border-radius: 32px;
            padding: 32px 24px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* ----- Badge hadiah ----- */
        .prize-badge {
            display: inline-block;
            background: #fef3c7;
            color: #b45309;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 1px;
            padding: 6px 18px;
            border-radius: 100px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* ----- Judul & nominal ----- */
        .title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .amount {
            font-size: 3.6rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -1px;
            line-height: 1.2;
            margin: 4px 0 6px;
        }

        .amount span {
            font-size: 2rem;
            font-weight: 600;
            color: #475569;
        }

        /* ----- Garis pemisah ----- */
        .divider {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
            margin: 18px 0 20px;
        }

        /* ----- Teks "Surah dikewafaksi" (mock) ----- */
        .sub-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 0.3px;
            margin-bottom: 16px;
        }

        /* ----- Panel lokasi (output) ----- */
        .location-panel {
            background: #f8fafc;
            border-radius: 18px;
            padding: 20px 16px;
            margin: 20px 0 24px;
            border: 1px solid #e9edf2;
            text-align: left;
            transition: all 0.3s ease;
        }

        .location-panel .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .location-panel .coord-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95rem;
            border-bottom: 1px dashed #e2e8f0;
        }

        .location-panel .coord-row:last-child {
            border-bottom: none;
        }

        .location-panel .coord-row .key {
            color: #475569;
            font-weight: 500;
        }

        .location-panel .coord-row .value {
            color: #0f172a;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            text-align: right;
            max-width: 65%;
        }

        .location-panel .status-msg {
            font-size: 0.9rem;
            color: #475569;
            padding: 10px 0 4px;
            text-align: center;
        }

        .location-panel .status-msg .emoji {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 4px;
        }

        /* ----- Tombol utama ----- */
        .btn-claim {
            display: block;
            width: 100%;
            padding: 16px 0;
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 24px rgba(234, 88, 12, 0.35);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .btn-claim:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(234, 88, 12, 0.45);
        }

        .btn-claim:active {
            transform: scale(0.97);
        }

        .btn-claim:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ----- Tombol kecil (reset / coba ulang) ----- */
        .btn-retry {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #f97316;
            background: transparent;
            border: 1.5px solid #f97316;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-retry:hover {
            background: #f97316;
            color: #fff;
        }

        /* ----- State sembunyi ----- */
        .hidden {
            display: none !important;
        }

        /* ----- Footer kecil ----- */
        .footer-note {
            margin-top: 20px;
            font-size: 0.6rem;
            color: #cbd5e1;
            letter-spacing: 0.3px;
        }

        /* ----- Responsif ----- */
        @media (max-width: 480px) {
            .card {
                padding: 24px 16px 32px;
            }
            .amount {
                font-size: 2.8rem;
            }
            .amount span {
                font-size: 1.6rem;
            }
            .location-panel .coord-row {
                font-size: 0.85rem;
                flex-wrap: wrap;
            }
            .location-panel .coord-row .value {
                max-width: 100%;
                text-align: left;
                margin-top: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="card" role="main">

        <!-- Badge -->
        <div class="prize-badge">🎉 Promo Spesial</div>

        <!-- Judul & nominal -->
        <p class="title">Total Hadiah Untukmu</p>
        <div class="amount">Rp200.000</div>

        <hr class="divider" />

        <!-- Teks "Surah dikewafaksi" (seperti di screenshot) -->
        <p class="sub-meta">Surah dikewafaksi · Siaw dikewafaksi</p>

        <!-- ===== Panel Lokasi ===== -->
        <div class="location-panel" id="locationPanel">
            <div class="label">📍 Data Lokasi</div>

            <!-- Status / pesan awal -->
            <div id="statusArea" class="status-msg">
                <span class="emoji">🌐</span>
                Klik tombol di bawah untuk<br />mengakses lokasi Anda.
            </div>

            <!-- Detail koordinat (sembunyi awal) -->
            <div id="detailArea" class="hidden">
                <div class="coord-row">
                    <span class="key">Latitude</span>
                    <span class="value" id="latValue">—</span>
                </div>
                <div class="coord-row">
                    <span class="key">Longitude</span>
                    <span class="value" id="lngValue">—</span>
                </div>
                <div class="coord-row">
                    <span class="key">Akurasi</span>
                    <span class="value" id="accValue">—</span>
                </div>
                <div class="coord-row" style="border-bottom: none;">
                    <span class="key">📍 Alamat</span>
                    <span class="value" id="addressValue" style="font-family: inherit; font-weight: 400; font-size: 0.85rem;">—</span>
                </div>
            </div>

            <!-- Tombol coba ulang (muncul saat error) -->
            <button id="retryBtn" class="btn-retry hidden">↻ Coba Ulang</button>
        </div>

        <!-- ===== Tombol Klaim ===== -->
        <button id="claimBtn" class="btn-claim">🎯 Klaim Sekarang</button>

        <!-- Footer (mimik console errors) -->
        <p class="footer-note">⚠️ Pastikan izin lokasi diaktifkan</p>
    </div>

    <script>
        (function() {
            'use strict';

            // ----- DOM refs -----
            const claimBtn = document.getElementById('claimBtn');
            const retryBtn = document.getElementById('retryBtn');
            const statusArea = document.getElementById('statusArea');
            const detailArea = document.getElementById('detailArea');
            const latValue = document.getElementById('latValue');
            const lngValue = document.getElementById('lngValue');
            const accValue = document.getElementById('accValue');
            const addressValue = document.getElementById('addressValue');

            // ----- Helper: update status UI -----
            function setStatus(emoji, message) {
                statusArea.innerHTML = `<span class="emoji">${emoji}</span>${message}`;
                statusArea.classList.remove('hidden');
                detailArea.classList.add('hidden');
                retryBtn.classList.add('hidden');
            }

            // ----- Helper: tampilkan data lokasi -----
            function showLocationData(position) {
                const { latitude, longitude, accuracy } = position.coords;

                // isi koordinat
                latValue.textContent = latitude.toFixed(7);
                lngValue.textContent = longitude.toFixed(7);
                accValue.textContent = accuracy ? `${Math.round(accuracy)} m` : '—';

                // sembunyikan status, tampilkan detail
                statusArea.classList.add('hidden');
                detailArea.classList.remove('hidden');
                retryBtn.classList.add('hidden');

                // (opsional) ambil alamat via reverse geocoding
                fetchReverseGeocode(latitude, longitude);
            }

            // ----- Reverse Geocoding (OpenStreetMap Nominatim) -----
            async function fetchReverseGeocode(lat, lng) {
                const url =
                    `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=16&accept-language=id`;

                try {
                    const resp = await fetch(url, {
                        headers: { 'User-Agent': 'KlaimHadiahApp/1.0' }
                    });
                    if (!resp.ok) throw new Error('Gagal mengambil alamat');
                    const data = await resp.json();
                    const displayName = data.display_name || 'Tidak tersedia';
                    addressValue.textContent = displayName;
                } catch (_) {
                    addressValue.textContent = 'Tidak dapat mengambil alamat';
                }
            }

            // ----- Fungsi utama: minta lokasi -----
            function requestLocation() {
                // disable tombol selama proses
                claimBtn.disabled = true;
                claimBtn.textContent = '⏳ Mengambil lokasi...';

                // cek dukungan geolocation
                if (!navigator.geolocation) {
                    setStatus('❌', 'Browser Anda tidak mendukung Geolokasi.');
                    claimBtn.disabled = false;
                    claimBtn.textContent = '🎯 Klaim Sekarang';
                    retryBtn.classList.remove('hidden');
                    return;
                }

                // opsi geolocation
                const options = {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0,
                };

                navigator.geolocation.getCurrentPosition(
                    // ----- Sukses -----
                    function(position) {
                        showLocationData(position);
                        claimBtn.disabled = false;
                        claimBtn.textContent = '✅ Lokasi Terdeteksi';
                        // ubah tombol menjadi "sudah" (tapi tetap bisa diklik lagi nanti)
                        // kita biarkan tombol tetap aktif untuk refresh
                        claimBtn.textContent = '🔄 Ambil Ulang Lokasi';
                        retryBtn.classList.add('hidden');
                    },
                    // ----- Gagal -----
                    function(error) {
                        let pesan = '';
                        let emoji = '⚠️';
                        switch (error.code) {
                            case error.PERMISSION_DENIED:
                                pesan =
                                'Izin lokasi ditolak. <br>Silakan aktifkan di pengaturan browser.';
                                emoji = '🚫';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                pesan = 'Lokasi tidak tersedia. <br>Pastikan GPS / Wi-Fi aktif.';
                                emoji = '📡';
                                break;
                            case error.TIMEOUT:
                                pesan = 'Waktu permintaan habis. <br>Coba lagi di area dengan sinyal lebih baik.';
                                emoji = '⏱️';
                                break;
                            default:
                                pesan = `Terjadi kesalahan: ${error.message}`;
                                emoji = '❗';
                        }
                        setStatus(emoji, pesan);
                        claimBtn.disabled = false;
                        claimBtn.textContent = '🎯 Klaim Sekarang';
                        retryBtn.classList.remove('hidden');
                    },
                    options
                );
            }

            // ----- Event: tombol Klaim -----
            claimBtn.addEventListener('click', function(e) {
                e.preventDefault();
                requestLocation();
            });

            // ----- Event: tombol Coba Ulang -----
            retryBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // reset status lalu panggil ulang
                setStatus('🌐', 'Meminta ulang izin lokasi…');
                retryBtn.classList.add('hidden');
                requestLocation();
            });

            // ----- Inisialisasi: state awal -----
            setStatus('🌐', 'Klik tombol di bawah untuk<br />mengakses lokasi Anda.');
            claimBtn.textContent = '🎯 Klaim Sekarang';

            // (opsional) jika user ingin mencoba langsung, tidak otomatis
            // biarkan user yang menginisiasi

        })();
    </script>

</body>
</html>
